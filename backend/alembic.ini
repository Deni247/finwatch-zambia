# =============================================================================
# FinWatch Zambia — Alembic Migration Configuration
# Run migrations: alembic upgrade head
# Generate new migration: alembic revision --autogenerate -m "description"
# =============================================================================

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# Database URL is read from environment via env.py
# Do not hardcode here — use .env file
sqlalchemy.url = sqlite:///./finwatch.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
