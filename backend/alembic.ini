# =============================================================================
# FinWatch Zambia — Alembic Migration Configuration
#
# Run from backend/:
#   alembic upgrade head              — apply all pending migrations
#   alembic downgrade -1              — roll back one migration
#   alembic revision --autogenerate -m "description"
#                                     — generate migration from ORM changes
#   alembic history                   — list all migration versions
#   alembic current                   — show currently applied version
# =============================================================================

[alembic]
script_location = migrations

# Adds backend/ to sys.path so `from app.xxx import yyy` resolves correctly
# when Alembic is run from the backend/ directory.
prepend_sys_path = .

version_path_separator = os

# -----------------------------------------------------------------------------
# Database URL
# NOTE: This value is OVERRIDDEN at runtime by migrations/env.py which reads
# DATABASE_URL from the .env file via app.core.config.settings.
# The value below is a fallback only — never rely on it directly.
# Always set DATABASE_URL in your .env file.
# -----------------------------------------------------------------------------
sqlalchemy.url = sqlite:///./finwatch.db

# -----------------------------------------------------------------------------
# Migration filename template
# Prefix with UTC timestamp so migration files sort chronologically in the
# versions/ directory. Default (without this) uses only the revision ID.
#
# Format: YYYY_MM_DD_HHMM_<rev>_<slug>.py
# Example: 2026_01_15_1430_a3f92b1c_add_last_login_at_to_users.py
# -----------------------------------------------------------------------------
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
